{% extends 'base.html' %}
{% block title %}Iniciar Sesión | EPS Digital{% endblock %}
{% block content %}
<section class="card form-card narrow">
    <h1>Iniciar Sesión</h1>
    <p>Completa los siguientes campos.</p>
    <form method="post" class="grid form-grid single-column">
        <label>Tipo de documento
            <select name="document_type" required>
                <option value="CC">Cédula de Ciudadanía</option>
                <option value="TI">Tarjeta de Identidad</option>
                <option value="CE">Cédula de Extranjería</option>
            </select>
        </label>
        <label>Número de Documento
            <input type="text" name="document_number" required>
        </label>
        <label>Contraseña
            <input type="password" name="password" required>
        </label>
        <div class="actions">
            <button class="button primary" type="submit">Ingresar</button>
            <a class="button secondary" href="{{ url_for('home') }}">Volver al inicio</a>
        </div>
    </form>
    <p><a href="{{ url_for('construction', title='Recuperación de contraseña') }}">¿Olvidaste tu contraseña?*</a></p>
    <p>¿No tienes cuenta? <a href="{{ url_for('register') }}">Crear cuenta</a></p>
</section>
{% endblock %}
